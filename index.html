<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tessera</title>
<meta name="description" content="Tessera — jeu de mosaïque à motifs.">
<meta name="theme-color" content="#14161c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <!-- ACCUEIL -->
  <section id="home">
    <div>
      <div class="brand">TESSERA</div>
      <div class="brand-sub">mosaïque &amp; motifs</div>
    </div>
    <div>
      <div class="card-label">Thème</div>
      <div class="themes" id="themes"></div>
    </div>
    <div>
      <div class="card-label">Mode</div>
      <div class="modes">
        <button class="mode-btn" data-mode="detente"><b>Détente</b><span>Pose libre, sans règle. Une case à la fois.</span></button>
        <button class="mode-btn" data-mode="histoire"><b>Histoire</b><span>Complète la grille et révèle le motif caché.</span></button>
      </div>
    </div>
  </section>

  <!-- JEU -->
  <section id="game" class="hidden">
    <div class="topbar">
      <button class="back" id="backBtn">‹ Accueil</button>
      <span class="title">TESSERA</span>
      <span class="mode-tag" id="modeTag"></span>
    </div>

    <div class="board-wrap" id="boardWrap"></div>

    <div class="resbar" id="resbar">
      <div class="res"><span class="ico">✦</span><span class="cubes" id="cubesE"></span><span class="val mono" id="valE">0</span></div>
      <div class="res mk"><span class="ico">🔨</span><span class="cubes" id="cubesC"></span><span class="val mono" id="valC">0</span></div>
      <div class="res es"><span class="ico">❖</span><span class="cubes" id="cubesS"></span><span class="val mono" id="valS">0</span></div>
    </div>

    <div class="atelier" id="atelier">
      <div class="head"><span class="t">Atelier</span><span class="t">glisse pour poser · touche pour pivoter</span></div>
      <div class="slots" id="slots"></div>
      <div class="actions" id="actions">
        <button class="act" id="smashBtn"><b>🔨</b><span class="cost">1🔨→✦</span></button>
        <button class="act" id="convBtn"><b>❖</b><span class="cost">2✦→❖</span></button>
        <button class="act" id="rerollBtn"><b>↻</b><span class="cost">1🔨</span></button>
        <button class="act" id="modBtn"><b>✎</b><span class="cost">recolore</span></button>
        <button class="act" id="createBtn"><b>＋</b><span class="cost">1❖+✦</span></button>
      </div>
    </div>

    <div class="atelier hidden" id="paletteWrap">
      <div class="head"><span class="t">Couleur</span><span class="t">pose libre</span></div>
      <div class="palette" id="palette"></div>
    </div>

    <div class="status" id="status"></div>
  </section>
</div>

<!-- Voile Histoire -->
<div class="veil hidden" id="storyVeil">
  <div class="panel">
    <h2 id="storyTitle"></h2>
    <div class="art" id="storyArt">[ illustration à venir ]</div>
    <p id="storyText"></p>
    <div class="row"><button class="btn primary" id="storyNext">Continuer</button></div>
  </div>
</div>

<!-- Voile Éditeur -->
<div class="veil hidden" id="editVeil">
  <div class="panel">
    <h2 id="editTitle">Modifier la tesselle</h2>
    <div class="picker-hint" id="pkHint"></div>
    <div class="editor" id="editor"></div>
    <div class="picker" id="picker"></div>
    <div class="edit-cost" id="editCost"></div>
    <div class="row">
      <button class="btn" id="editCancel">Annuler</button>
      <button class="btn primary" id="editOk">Valider</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
